<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Eiseb Financial System</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">🐄 Eiseb Financial System</span>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="transactions.html">Transactions</a></li>
      <li><a href="reports.html">Reports</a></li>
      <li><a href="contact.html" class="active">Contact Us</a></li>
    </ul>
  </nav>

  <main class="page-content">
    <h1>Contact Us</h1>
    <p>Have a question or need support? Fill in the form below and we'll get back to you.</p>

    <form class="contact-form" action="/contact" method="POST">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Your full name">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required placeholder="Write your message here..."></textarea>
      </div>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>
  </main>
</body>
</html>
