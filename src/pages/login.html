<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Eiseb Financial System</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <h1>🐄 Eiseb Country Traders</h1>
      <p>Livestock Financial Management System</p>
    </div>
    <form class="auth-form" action="/login" method="POST">
      <h2>Sign In</h2>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@eiseb.na">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary">Login</button>
      <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
    </form>
  </div>
</body>
</html>
