<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Eiseb Financial System</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <h1>🐄 Eiseb Country Traders</h1>
      <p>Livestock Financial Management System</p>
    </div>
    <form class="auth-form" action="/register" method="POST">
      <h2>Create Account</h2>
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required placeholder="Your Full Name">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@eiseb.na">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Min. 8 characters">
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" required placeholder="Repeat password">
      </div>
      <button type="submit" class="btn-primary">Register</button>
      <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
    </form>
  </div>
</body>
</html>
